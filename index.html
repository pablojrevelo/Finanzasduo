<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0f1117"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="FinanzasDuo"/>
  <meta name="description" content="Control financiero en pareja"/>
  <title>FinanzasDuo</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="icon" type="image/png" href="icons/icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;}
    body{background:#0f1117;color:#e8eaf6;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:#2a3050;border-radius:3px;}
    input,select,textarea,button{font-family:inherit;}
    input[type=number]::-webkit-inner-spin-button{opacity:0;}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
// ── Helpers ────────────────────────────────────────────────────────────────
const {useState,useEffect,useCallback,useRef,createElement:h} = React;
const SK="finanzasduo_v3";
function load(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch{return null;}}
function persist(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch{}}
const fmt=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(n||0);
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
function mkKey(m,y){return `${y}-${String(m).padStart(2,"0")}`;}
function nowMY(){const d=new Date();return{month:d.getMonth()+1,year:d.getFullYear()};}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}

// ── Data ───────────────────────────────────────────────────────────────────
const DEF_CATS=[
  {id:"c1",name:"Renta / Hipoteca",type:"Gasto Fijo",owner:"Compartido"},
  {id:"c2",name:"Servicios (Agua/Luz/Gas)",type:"Gasto Fijo",owner:"Compartido"},
  {id:"c3",name:"Internet / Teléfono",type:"Gasto Fijo",owner:"Compartido"},
  {id:"c4",name:"Seguro Médico",type:"Gasto Fijo",owner:"Compartido"},
  {id:"c5",name:"Transporte / Gasolina",type:"Gasto Fijo",owner:"Individual"},
  {id:"c6",name:"Retiro de Efectivo",type:"Gasto Fijo",owner:"Individual"},
  {id:"c7",name:"Suscripciones",type:"Gasto Fijo",owner:"Compartido"},
  {id:"c8",name:"Supermercado / Comida",type:"Gasto Variable",owner:"Compartido"},
  {id:"c9",name:"Restaurantes / Salidas",type:"Gasto Variable",owner:"Compartido"},
  {id:"c10",name:"Ropa y Personal",type:"Gasto Variable",owner:"Individual"},
  {id:"c11",name:"Entretenimiento",type:"Gasto Variable",owner:"Compartido"},
  {id:"c12",name:"Salud / Farmacia",type:"Gasto Variable",owner:"Compartido"},
  {id:"c13",name:"Imprevistos",type:"Gasto Variable",owner:"Compartido"},
  {id:"c14",name:"Otro",type:"Gasto Variable",owner:"Individual"},
];
const DEF_INC=["Salario","Horas Extras","Freelance / Extra","Otro"];
const DEF_SAV=[
  {id:"s1",name:"Fondo de Emergencia",owner:"Compartido"},
  {id:"s2",name:"Vacaciones",owner:"Compartido"},
  {id:"s3",name:"Proyecto Especial",owner:"Compartido"},
  {id:"s4",name:"Ahorro Personal",owner:"Individual"},
];
const USERS=[
  {id:"pablo",name:"Pablo",pin:"1234",color:"#4f8ef7"},
  {id:"sofia",name:"Sofía",pin:"5678",color:"#f472b6"},
];
function initState(){return{categories:DEF_CATS,incomeCategories:DEF_INC,savingsGoals:DEF_SAV,incomes:[],expenses:[],savings:[],budgets:[],settlements:[]};}

// ── Palette ────────────────────────────────────────────────────────────────
const C={bg:"#0f1117",surface:"#181c27",card:"#1e2336",border:"#2a3050",accent:"#4f8ef7",green:"#36d399",red:"#f87272",yellow:"#fbbd23",purple:"#a78bfa",text:"#e8eaf6",muted:"#7986b0",pablo:"#4f8ef7",sofia:"#f472b6"};

// ── UI helpers ─────────────────────────────────────────────────────────────
const iS={background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,padding:"10px 12px",width:"100%",fontSize:15,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};
const lS={color:C.muted,fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:4,display:"block",textTransform:"uppercase"};
function btnP(color){return{background:color||C.accent,color:"#fff",border:"none",borderRadius:10,padding:"13px 20px",fontSize:15,fontWeight:700,cursor:"pointer",width:"100%",fontFamily:"inherit"};}
const btnSec={background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:10,padding:"13px 20px",fontSize:15,fontWeight:600,cursor:"pointer",width:"100%",fontFamily:"inherit"};

function Field({label,children,hint}){
  return h("div",{style:{marginBottom:16}},
    h("label",{style:lS},label),
    children,
    hint&&h("div",{style:{color:C.muted,fontSize:11,marginTop:4}},hint)
  );
}
function Pill({label,color}){
  return h("span",{style:{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}},label);
}
function MiniBar({value,max,color}){
  const pct=max>0?Math.min((value/max)*100,100):0;
  const over=max>0&&value>max;
  return h("div",{style:{background:C.border,borderRadius:4,height:7,overflow:"hidden",flex:1}},
    h("div",{style:{width:`${pct}%`,height:"100%",background:over?C.red:color,borderRadius:4,transition:"width .4s"}})
  );
}
function Modal({title,onClose,children}){
  return h("div",{style:{position:"fixed",inset:0,background:"#000c",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"},onClick:onClose},
    h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:560,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 -20px 60px #000c"},onClick:e=>e.stopPropagation()},
      h("div",{style:{width:40,height:4,background:C.border,borderRadius:4,margin:"0 auto 20px"}}),
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
        h("h3",{style:{color:C.text,fontSize:18,fontFamily:"'Playfair Display',serif"}},title),
        h("button",{onClick:onClose,style:{background:C.surface,border:"none",color:C.muted,fontSize:20,cursor:"pointer",width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}},"×")
      ),
      children
    )
  );
}
function KpiCard({icon,label,value,color,sub,small}){
  return h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:small?"12px 14px":"14px 16px"}},
    h("div",{style:{fontSize:small?18:22,marginBottom:4}},icon),
    h("div",{style:{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:3}},label),
    h("div",{style:{color:color||C.text,fontSize:small?16:18,fontWeight:700}},fmt(value)),
    sub&&h("div",{style:{color:C.muted,fontSize:11,marginTop:2}},sub)
  );
}
function SectionTitle({children}){
  return h("div",{style:{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:10,marginTop:22,paddingBottom:6,borderBottom:`1px solid ${C.border}`}},children);
}
function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t);},[]);
  return h("div",{style:{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:C.green,color:"#0f1117",padding:"10px 20px",borderRadius:30,fontWeight:700,fontSize:14,zIndex:2000,boxShadow:"0 4px 20px #0006",whiteSpace:"nowrap"}},`✓ ${msg}`);
}
function EmptyState({icon,msg,action,onAction}){
  return h("div",{style:{textAlign:"center",padding:"52px 20px"}},
    h("div",{style:{fontSize:42,marginBottom:10}},icon),
    h("div",{style:{color:C.muted,fontSize:14,marginBottom:action?18:0}},msg),
    action&&h("button",{onClick:onAction,style:{...btnP(C.accent),width:"auto",padding:"11px 22px",fontSize:14}},action)
  );
}

// ── LOGIN ──────────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [sel,setSel]=useState(null);
  const [pin,setPin]=useState("");
  const [err,setErr]=useState("");
  const [show,setShow]=useState(false);

  if(!sel) return h("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28}},
    h("div",{style:{textAlign:"center",marginBottom:44}},
      h("div",{style:{fontSize:56,marginBottom:14}},"💰"),
      h("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:30,color:C.text,fontWeight:700}},"FinanzasDuo"),
      h("div",{style:{color:C.muted,fontSize:14,marginTop:6}},"Control financiero en pareja")
    ),
    h("div",{style:{width:"100%",maxWidth:360}},
      h("div",{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:2,textAlign:"center",marginBottom:18}},"¿QUIÉN ERES?"),
      USERS.map(u=>h("button",{key:u.id,onClick:()=>setSel(u.id),style:{width:"100%",background:C.card,border:`2px solid ${C.border}`,borderRadius:16,padding:"20px 22px",marginBottom:14,cursor:"pointer",display:"flex",alignItems:"center",gap:18}},
        h("div",{style:{width:52,height:52,borderRadius:"50%",background:u.color+"22",border:`2px solid ${u.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:700,color:u.color,flexShrink:0}},u.name[0]),
        h("span",{style:{color:C.text,fontSize:19,fontWeight:700,fontFamily:"'Playfair Display',serif"}},u.name),
        h("span",{style:{marginLeft:"auto",color:C.muted,fontSize:20}},"›")
      ))
    )
  );

  const u=USERS.find(x=>x.id===sel);
  return h("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28}},
    h("div",{style:{width:"100%",maxWidth:360}},
      h("div",{style:{textAlign:"center",marginBottom:36}},
        h("div",{style:{width:72,height:72,borderRadius:"50%",background:u.color+"22",border:`2px solid ${u.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,fontWeight:700,color:u.color,margin:"0 auto 14px"}},u.name[0]),
        h("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:24,color:C.text}},`Hola, ${u.name}`),
        h("div",{style:{color:C.muted,fontSize:14,marginTop:6}},"Ingresa tu PIN")
      ),
      h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:18,padding:26}},
        h(Field,{label:"PIN de acceso"},
          h("div",{style:{position:"relative"}},
            h("input",{type:show?"text":"password",maxLength:8,value:pin,
              onChange:e=>{setPin(e.target.value);setErr("");},
              onKeyDown:e=>e.key==="Enter"&&(pin===u.pin?onLogin(u.id):(setErr("PIN incorrecto"),setPin(""))),
              style:{...iS,letterSpacing:8,fontSize:22,textAlign:"center",paddingRight:44},placeholder:"••••",autoFocus:true}),
            h("button",{onClick:()=>setShow(v=>!v),style:{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:18,padding:4}},show?"🙈":"👁")
          )
        ),
        err&&h("div",{style:{color:C.red,fontSize:13,textAlign:"center",marginBottom:14}},`⚠️ ${err}`),
        h("button",{onClick:()=>{if(pin===u.pin)onLogin(u.id);else{setErr("PIN incorrecto");setPin("");}},style:btnP(u.color)},"Entrar"),
        h("button",{onClick:()=>{setSel(null);setPin("");setErr("");},style:{...btnSec,marginTop:10}},"← Cambiar usuario")
      ),
      h("div",{style:{color:C.muted,fontSize:11,textAlign:"center",marginTop:16}},"PIN por defecto — Pablo: 1234 · Sofía: 5678")
    )
  );
}

// ── SYNC ──────────────────────────────────────────────────────────────────
function SyncScreen({state,setState,onClose,me}){
  const [tab,setTab]=useState("export");
  const [imported,setImported]=useState(false);
  const fileRef=useRef();

  function doExport(){
    const blob=new Blob([JSON.stringify({exportedBy:me.id,exportedAt:new Date().toISOString(),version:3,data:state},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`finanzasduo-${new Date().toLocaleDateString("es")}.json`;a.click();
    URL.revokeObjectURL(url);
  }

  function doImport(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const payload=JSON.parse(ev.target.result);
        if(!payload.data){alert("Archivo no válido");return;}
        const merge=(a,b)=>{const m={};[...(a||[]),...(b||[])].forEach(x=>{m[x.id]=x;});return Object.values(m);};
        const merged={...state,
          categories:[...new Map([...state.categories,...payload.data.categories].map(x=>[x.id,x])).values()],
          savingsGoals:[...new Map([...state.savingsGoals,...payload.data.savingsGoals].map(x=>[x.id,x])).values()],
          incomeCategories:[...new Set([...state.incomeCategories,...payload.data.incomeCategories])],
          incomes:merge(state.incomes,payload.data.incomes),
          expenses:merge(state.expenses,payload.data.expenses),
          savings:merge(state.savings,payload.data.savings),
          budgets:merge(state.budgets,payload.data.budgets),
          settlements:merge(state.settlements,payload.data.settlements),
        };
        setState(merged);persist(merged);setImported(true);
      }catch{alert("Error al leer el archivo.");}
    };
    reader.readAsText(file);
  }

  return h("div",{style:{position:"fixed",inset:0,background:"#000d",zIndex:900,display:"flex",alignItems:"flex-end"},onClick:onClose},
    h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",width:"100%",maxHeight:"85vh",overflowY:"auto"},onClick:e=>e.stopPropagation()},
      h("div",{style:{width:40,height:4,background:C.border,borderRadius:4,margin:"0 auto 20px"}}),
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
        h("h3",{style:{fontFamily:"'Playfair Display',serif",fontSize:18}},"🔄 Sincronizar datos"),
        h("button",{onClick:onClose,style:{background:C.surface,border:"none",color:C.muted,fontSize:20,cursor:"pointer",width:36,height:36,borderRadius:"50%"}},"×")
      ),
      h("div",{style:{display:"flex",gap:6,background:C.surface,borderRadius:10,padding:4,marginBottom:20}},
        [["export","📤 Exportar"],["import","📥 Importar"],["guide","📖 Guía"]].map(([id,label])=>
          h("button",{key:id,onClick:()=>setTab(id),style:{flex:1,background:tab===id?C.card:"transparent",color:tab===id?me.color:C.muted,border:"none",borderRadius:8,padding:"9px 6px",fontSize:13,fontWeight:700,cursor:"pointer"}},label)
        )
      ),
      tab==="export"&&h("div",null,
        h("div",{style:{background:C.surface,borderRadius:12,padding:16,marginBottom:18,fontSize:13,color:C.text,lineHeight:1.6}},
          "Exporta todos los datos. Envíaselo a tu pareja por WhatsApp para que los importe."
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:18}},
          [{label:"Ingresos",val:state.incomes.length,icon:"💵"},{label:"Gastos",val:state.expenses.length,icon:"💸"},{label:"Ahorros",val:state.savings.length,icon:"🏦"}]
            .map(k=>h("div",{key:k.label,style:{background:C.card,borderRadius:10,padding:12,textAlign:"center"}},
              h("div",{style:{fontSize:20}},k.icon),
              h("div",{style:{color:me.color,fontWeight:700,fontSize:18}},k.val),
              h("div",{style:{color:C.muted,fontSize:11}},k.label)
            ))
        ),
        h("button",{onClick:doExport,style:btnP(me.color)},"📤 Descargar archivo de datos")
      ),
      tab==="import"&&h("div",null,
        imported
          ?h("div",{style:{textAlign:"center",padding:"30px 0"}},
              h("div",{style:{fontSize:52,marginBottom:12}},"✅"),
              h("div",{style:{color:C.green,fontWeight:700,fontSize:18,marginBottom:8}},"¡Datos importados!"),
              h("div",{style:{color:C.muted,fontSize:13}},"Los datos se combinaron correctamente."),
              h("button",{onClick:onClose,style:{...btnP(C.green),marginTop:20}},"Continuar")
            )
          :h("div",null,
              h("div",{style:{background:C.surface,borderRadius:12,padding:16,marginBottom:18,fontSize:13,color:C.text,lineHeight:1.6}},
                "Importa el archivo que te envió tu pareja. Los datos se combinarán con los tuyos."
              ),
              h("input",{ref:fileRef,type:"file",accept:".json",onChange:doImport,style:{display:"none"}}),
              h("button",{onClick:()=>fileRef.current.click(),style:btnP(me.color)},"📂 Seleccionar archivo")
            )
      ),
      tab==="guide"&&h("div",null,
        [
          ["1️⃣","Uno de los dos registra sus gastos e ingresos del mes."],
          ["2️⃣","Va a 🔄 → Exportar y descarga el archivo."],
          ["3️⃣","Envía el archivo al otro por WhatsApp."],
          ["4️⃣","El otro abre 🔄 → Importar y selecciona el archivo."],
          ["5️⃣","Los datos se combinan automáticamente. ✅"],
          ["💡","Repitan esto una vez por semana o tras registros importantes."],
        ].map(([num,text])=>h("div",{key:num,style:{display:"flex",gap:12,marginBottom:12,background:C.surface,borderRadius:10,padding:12}},
          h("span",{style:{fontSize:18,flexShrink:0}},num),
          h("span",{style:{color:C.muted,fontSize:13}},text)
        ))
      )
    )
  );
}

// ── BUDGET ROW ─────────────────────────────────────────────────────────────
function BudgetRow({cat,scope,getSpent,getBudget,color,onDel}){
  const spent=getSpent(cat.id,scope);
  const budg=getBudget(cat.id,scope);
  const over=budg>0&&spent>budg;
  return h("div",{style:{background:C.card,border:`1px solid ${over?C.red:C.border}`,borderRadius:12,padding:"12px 14px",marginBottom:8}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}},
      h("div",{style:{flex:1,minWidth:0,marginRight:8}},
        h("div",{style:{fontSize:14,fontWeight:500,marginBottom:4}},cat.name),
        h("div",{style:{display:"flex",gap:5,flexWrap:"wrap"}},
          h(Pill,{label:cat.type==="Gasto Fijo"?"Fijo":"Variable",color:cat.type==="Gasto Fijo"?C.accent:C.yellow}),
          h(Pill,{label:cat.owner,color:cat.owner==="Compartido"?C.purple:color})
        )
      ),
      h("div",{style:{display:"flex",gap:8,alignItems:"center",flexShrink:0}},
        h("div",{style:{textAlign:"right"}},
          h("div",{style:{fontSize:14,color:over?C.red:C.text,fontWeight:600}},fmt(spent)),
          budg>0&&h("div",{style:{fontSize:11,color:C.muted}},`de ${fmt(budg)}`)
        ),
        h("button",{onClick:onDel,style:{background:C.red+"22",border:"none",color:C.red,borderRadius:8,padding:"5px 9px",cursor:"pointer",fontSize:13}},"✕")
      )
    ),
    h(MiniBar,{value:spent,max:budg||spent||1,color}),
    over&&h("div",{style:{fontSize:11,color:C.red,marginTop:4}},`⚠️ Excedido por ${fmt(spent-budg)}`)
  );
}

// ── MODALS ─────────────────────────────────────────────────────────────────
function ExpenseModal({state,me,MK,onAdd,onClose}){
  const [mo,yr]=MK.split("-");
  const dd=`${yr}-${mo}-${String(new Date().getDate()).padStart(2,"0")}`;
  const [f,setF]=useState({date:dd,description:"",catId:state.categories[0]?.id,catName:state.categories[0]?.name,amount:"",shared:false,splitCount:"2",payment:"Tarjeta",notes:""});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  function submit(){
    if(!f.description||!f.amount)return;
    const c=state.categories.find(x=>x.id===f.catId);
    onAdd({...f,catName:c?.name||f.catName});onClose();
  }
  return h(Modal,{title:"Registrar Gasto",onClose},
    h(Field,{label:"Fecha"},h("input",{type:"date",style:iS,value:f.date,onChange:e=>set("date",e.target.value)})),
    h(Field,{label:"Descripción"},h("input",{style:iS,placeholder:"Ej: Supermercado semanal",value:f.description,onChange:e=>set("description",e.target.value)})),
    h(Field,{label:"Categoría"},
      h("select",{style:iS,value:f.catId,onChange:e=>{const c=state.categories.find(x=>x.id===e.target.value);set("catId",e.target.value);set("catName",c?.name||"");}},
        state.categories.map(c=>h("option",{key:c.id,value:c.id},c.name))
      )
    ),
    h(Field,{label:"Monto ($)"},h("input",{type:"number",style:iS,placeholder:"0.00",value:f.amount,onChange:e=>set("amount",e.target.value)})),
    h(Field,{label:"Medio de pago"},
      h("select",{style:iS,value:f.payment,onChange:e=>set("payment",e.target.value)},
        h("option",{value:"Tarjeta"},"💳 Tarjeta de Crédito"),
        h("option",{value:"Efectivo"},"💵 Efectivo")
      )
    ),
    h(Field,{label:"¿Es compartido?"},
      h("select",{style:iS,value:f.shared?"si":"no",onChange:e=>set("shared",e.target.value==="si")},
        h("option",{value:"no"},"No, es personal"),
        h("option",{value:"si"},"Sí, compartido")
      )

function SettleModal({iOwePartner,partner,sharedExp,settledIds,onAdd,onClose,me}){
  const unsettled=sharedExp.filter(e=>!settledIds.has(e.id)&&e.userId!==me.id);
  const [selExp,setSelExp]=useState(unsettled.map(e=>e.id));
  const [note,setNote]=useState("");
  const amount=Math.abs(iOwePartner);
  function toggle(id){setSelExp(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);}
  function submit(){onAdd({amount,expenseIds:selExp,note});onClose();}
  return h(Modal,{title:"Registrar Pago de Deuda",onClose},
    h("div",{style:{background:C.surface,borderRadius:10,padding:16,marginBottom:16}},
      h("div",{style:{color:C.muted,fontSize:11,marginBottom:4}},"MONTO A SALDAR"),

      h("div",{style:{color:C.muted,fontSize:13,marginTop:4}},iOwePartner>0?`Pagas a ${partner.name}`:`${partner.name} te paga`)
    ),
    unsettled.length>0&&h(Field,{label:"Gastos que se saldan"},
      h("div",{style:{border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",maxHeight:200,overflowY:"auto"}},

          h("input",{type:"checkbox",checked:selExp.includes(e.id),onChange:()=>toggle(e.id),style:{accentColor:C.green,width:18,height:18}}),

          h("span",{style:{color:C.muted,fontSize:13}},fmt(e.amount))

    h("button",{style:btnP(C.green),onClick:submit},"✅ Confirmar Pago")
  );
}

// ── MAIN APP ───────────────────────────────────────────────────────────────
function App(){
  const [loggedUser,setLoggedUser]=useState(null);
  const [state,setStateRaw]=useState(()=>load()||initState());
  const [tab,setTab]=useState("dashboard");
  const [selMonth,setSelMonth]=useState(nowMY().month);
  const [selYear,setSelYear]=useState(nowMY().year);
  const [showSync,setShowSync]=useState(false);
  const [toast,setToast]=useState(null);
  const [expandedExp,setExpandedExp]=useState({});
  const [modExp,setModExp]=useState(false);
  const [modInc,setModInc]=useState(false);
  const [modSav,setModSav]=useState(false);
  const [modBud,setModBud]=useState(false);
  const [modCat,setModCat]=useState(false);
  const [modSavGoal,setModSavGoal]=useState(false);
  const [modSettle,setModSettle]=useState(false);

  function setState(next){setStateRaw(next);persist(next);}
  const upd=useCallback(fn=>setStateRaw(prev=>{const n=JSON.parse(JSON.stringify(prev));fn(n);persist(n);return n;}),[]);

  if(!loggedUser)return h(LoginScreen,{onLogin:setLoggedUser});

  const me=USERS.find(u=>u.id===loggedUser);
  const partner=USERS.find(u=>u.id!==loggedUser);
  const MK=mkKey(selMonth,selYear);

  const mInc=state.incomes.filter(i=>i.mk===MK);
  const mExp=state.expenses.filter(e=>e.mk===MK);
  const mSav=state.savings.filter(s=>s.mk===MK);
  const mBud=state.budgets.filter(b=>b.mk===MK);
  const mSett=state.settlements.filter(s=>s.mk===MK);
  const settledIds=new Set(mSett.flatMap(s=>s.expenseIds||[]));

  const myInc=mInc.filter(i=>i.userId===loggedUser);
  const myExp=mExp.filter(e=>e.userId===loggedUser);
  const sharedExp=mExp.filter(e=>e.shared);
  const myPersonalExp=myExp.filter(e=>!e.shared);
  const mySharedPaid=myExp.filter(e=>e.shared);
  const partnerSharedPaid=mExp.filter(e=>e.shared&&e.userId===partner.id);

  const totalMyInc=myInc.reduce((s,i)=>s+i.amount,0);
  const totalMyPersonalExp=myPersonalExp.reduce((s,e)=>s+e.amount,0);
  const totalMySharedFair=mySharedPaid.reduce((s,e)=>s+(e.amount/(e.splitCount||2)),0);
  const totalPartnerFair=partnerSharedPaid.filter(e=>!settledIds.has(e.id)).reduce((s,e)=>s+(e.amount/(e.splitCount||2)),0);
  const totalMyExp=totalMyPersonalExp+totalMySharedFair+totalPartnerFair;
  const myCash=myExp.reduce((s,e)=>s+(e.payment==="Efectivo"?e.amount:0),0);
  const myCard=myExp.reduce((s,e)=>s+(e.payment==="Tarjeta"?e.amount:0),0);
  const totalBudInd=mBud.filter(b=>b.userId===loggedUser&&b.scope==="individual").reduce((s,b)=>s+b.amount,0);
  const totalBudSha=mBud.filter(b=>b.userId===loggedUser&&b.scope==="compartido").reduce((s,b)=>s+b.amount,0);
  const totalMySav=mSav.filter(s=>s.userId===loggedUser).reduce((s,sv)=>s+sv.amount,0);
  const totalSharedSav=mSav.filter(s=>s.goalOwner==="Compartido").reduce((s,sv)=>s+sv.amount,0);
  const disponible=totalMyInc-totalMyExp-totalMySav;
  const iPaid=mySharedPaid.filter(e=>!settledIds.has(e.id)).reduce((s,e)=>s+e.amount,0);
  const partPaid=partnerSharedPaid.filter(e=>!settledIds.has(e.id)).reduce((s,e)=>s+e.amount,0);
  const iOwePartner=((iPaid+partPaid)/2)-iPaid;
  const thirdPartyDue=sharedExp.filter(e=>e.splitCount>2&&e.userId===loggedUser).reduce((s,e)=>s+(e.amount/e.splitCount)*(e.splitCount-2),0);

  function getBudget(catId,scope){return(mBud.find(b=>b.catId===catId&&b.userId===loggedUser&&b.scope===scope)||{}).amount||0;}
  function getSpent(catId,scope){
    if(scope==="individual")return myPersonalExp.filter(e=>e.catId===catId).reduce((s,e)=>s+e.amount,0);
    return sharedExp.filter(e=>e.catId===catId).reduce((s,e)=>s+(e.amount/(e.splitCount||2)),0);
  }

  function addExpense(f){upd(s=>{s.expenses.push({id:uid(),mk:MK,userId:loggedUser,...f,amount:parseFloat(f.amount),splitCount:parseInt(f.splitCount)||2});});setToast("Gasto guardado");}
  function addIncome(f){upd(s=>{s.incomes.push({id:uid(),mk:MK,userId:loggedUser,...f,amount:parseFloat(f.amount)});});setToast("Ingreso guardado");}
  function addSaving(f){upd(s=>{s.savings.push({id:uid(),mk:MK,userId:loggedUser,...f,amount:parseFloat(f.amount)});});setToast("Ahorro guardado");}
  function addBudget(f){
    upd(s=>{
      const idx=s.budgets.findIndex(b=>b.mk===MK&&b.catId===f.catId&&b.userId===loggedUser&&b.scope===f.scope);
      const item={id:uid(),mk:MK,userId:loggedUser,...f,amount:parseFloat(f.amount)};
      if(idx>=0)s.budgets[idx]=item;else s.budgets.push(item);
    });
    setToast("Presupuesto actualizado");
  }
  function addCategory(f){upd(s=>{s.categories.push({id:uid(),...f});});setToast("Categoría creada");}
  function delCategory(id){upd(s=>{s.categories=s.categories.filter(c=>c.id!==id);});}
  function addSavGoal(f){upd(s=>{s.savingsGoals.push({id:uid(),...f});});setToast("Meta creada");}
  function delRecord(type,id){upd(s=>{s[type]=s[type].filter(x=>x.id!==id);});}
  function addSettlement(f){upd(s=>{s.settlements.push({id:uid(),mk:MK,by:loggedUser,...f,amount:parseFloat(f.amount),date:todayStr()});});setToast("Pago registrado");}
  function toggleExp(id){setExpandedExp(p=>({...p,[id]:!p[id]}));}

  const TABS=[
    {id:"dashboard",label:"📊",full:"Dashboard"},
    {id:"expenses",label:"💸",full:"Gastos"},
    {id:"income",label:"💵",full:"Ingresos"},
    {id:"savings",label:"🏦",full:"Ahorros"},
    {id:"budget",label:"📋",full:"Presupuesto"},
    {id:"shared",label:"🤝",full:"Compartido"},
  ];

  return h("div",{style:{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'DM Sans',sans-serif",paddingBottom:72}},
    // HEADER
    h("div",{style:{background:C.surface,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:100}},
      h("div",{style:{maxWidth:600,margin:"0 auto",padding:"10px 14px",display:"flex",alignItems:"center",gap:10}},
        h("div",{style:{flex:1}},
          h("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700}},"💰 FinanzasDuo")
        ),
        h("select",{value:selMonth,onChange:e=>setSelMonth(+e.target.value),style:{...iS,width:"auto",padding:"6px 10px",fontSize:13}},
          MONTHS.map((m,i)=>h("option",{key:i,value:i+1},m))
        ),
        h("select",{value:selYear,onChange:e=>setSelYear(+e.target.value),style:{...iS,width:"auto",padding:"6px 10px",fontSize:13}},
          [2024,2025,2026,2027].map(y=>h("option",{key:y,value:y},y))
        ),
        h("button",{onClick:()=>setShowSync(true),style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 10px",cursor:"pointer",fontSize:16,color:C.muted}},"🔄"),
        h("div",{onClick:()=>setLoggedUser(null),style:{width:34,height:34,borderRadius:"50%",background:me.color+"22",border:`2px solid ${me.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:me.color,cursor:"pointer"}},me.name[0])
      )
    ),

    // CONTENT
    h("div",{style:{maxWidth:600,margin:"0 auto",padding:"14px 14px 0"}},

      // DASHBOARD
      tab==="dashboard"&&h("div",null,
        h("div",{style:{marginBottom:18}},
          h("h2",{style:{fontFamily:"'Playfair Display',serif",fontSize:22,marginBottom:2}},`Hola, ${me.name} 👋`),
          h("div",{style:{color:C.muted,fontSize:13}},`${MONTHS[selMonth-1]} ${selYear}`)
        ),
        h(SectionTitle,null,"Mi Resumen Individual"),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:4}},
          h(KpiCard,{icon:"💵",label:"Ingresos",value:totalMyInc,color:C.green}),
          h(KpiCard,{icon:"💸",label:"Gastos",value:totalMyExp,color:C.red}),
          h(KpiCard,{icon:"📋",label:"Presupuesto",value:totalBudInd,color:C.yellow}),
          h(KpiCard,{icon:"🏦",label:"Mis Ahorros",value:totalMySav,color:C.purple})
        ),
        h("div",{style:{background:C.card,border:`2px solid ${disponible>=0?C.green:C.red}`,borderRadius:14,padding:"14px 18px",marginTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("div",null,
            h("div",{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:1}},"DISPONIBLE"),
            h("div",{style:{color:disponible>=0?C.green:C.red,fontSize:22,fontWeight:700}},fmt(disponible))
          ),
          h("div",{style:{fontSize:30}},disponible>=0?"✅":"⚠️")
        ),
        h(SectionTitle,null,"Mis Gastos por Medio de Pago"),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:4}},
          h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px"}},
            h("div",{style:{fontSize:22,marginBottom:4}},"💵"),
            h("div",{style:{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:3}},"EFECTIVO"),
            h("div",{style:{color:C.yellow,fontSize:18,fontWeight:700}},fmt(myCash))
          ),
          h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px"}},
            h("div",{style:{fontSize:22,marginBottom:4}},"💳"),
            h("div",{style:{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:3}},"TARJETA"),
            h("div",{style:{color:C.accent,fontSize:18,fontWeight:700}},fmt(myCard))
          )
        ),
        h(SectionTitle,null,"Pareja — Vista Compartida"),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
          h(KpiCard,{small:true,icon:"🤝",label:"Gastos compartidos",value:iPaid+partPaid,color:C.yellow}),
          h(KpiCard,{small:true,icon:"🏦",label:"Ahorros conjuntos",value:totalSharedSav,color:C.purple}),
          h(KpiCard,{small:true,icon:"📋",label:"Presupuesto comp.",value:totalBudSha,color:C.yellow}),
          thirdPartyDue>0&&h(KpiCard,{small:true,icon:"👥",label:"Otros nos deben",value:thirdPartyDue,color:C.green})
        ),
        h(SectionTitle,null,"Balance del Mes"),
        h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16}},
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
            USERS.map(u=>{
              const paid=mExp.filter(e=>e.shared&&e.userId===u.id&&!settledIds.has(e.id)).reduce((s,e)=>s+e.amount,0);
              return h("div",{key:u.id,style:{background:C.surface,borderRadius:10,padding:12}},
                h("div",{style:{color:C.muted,fontSize:10}},`${u.name.toUpperCase()} PAGÓ`),
                h("div",{style:{color:u.color,fontSize:18,fontWeight:700}},fmt(paid))
              );
            })
          ),
          h("div",{style:{background:C.surface,borderRadius:10,padding:13}},
            Math.abs(iOwePartner)<0.01
              ?h("div",{style:{color:C.green,fontWeight:700}},"✅ Están equilibrados")
              :iOwePartner>0
                ?h("div",{style:{fontWeight:700,color:me.color}},`Debes ${fmt(iOwePartner)} a ${partner.name}`)
                :h("div",{style:{fontWeight:700,color:partner.color}},`${partner.name} te debe ${fmt(Math.abs(iOwePartner))}`)
          ),
          thirdPartyDue>0&&h("div",{style:{background:C.surface,borderRadius:10,padding:13,marginTop:8}},
            h("div",{style:{color:C.muted,fontSize:10,marginBottom:3}},"OTRAS PERSONAS NOS DEBEN"),
            h("div",{style:{color:C.green,fontWeight:700}},fmt(thirdPartyDue))

        )
      ),

      // EXPENSES
      tab==="expenses"&&h("div",null,

          h("h2",{style:{fontFamily:"'Playfair Display',serif",fontSize:20}},"Mis Gastos"),

        ),
        myExp.length===0
          ?h(EmptyState,{icon:"💸",msg:"No hay gastos este mes",action:"+ Agregar",onAction:()=>setModExp(true)})
          :myExp.map(e=>h("div",{key:e.id,style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,marginBottom:10,overflow:"hidden"}},
              h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"13px 14px"}},
                h("div",{style:{flex:1,minWidth:0}},
                  h("div",{style:{fontSize:15,fontWeight:600,color:C.text,marginBottom:3}},e.description),

                h("div",{style:{display:"flex",gap:6,alignItems:"center",flexShrink:0}},

                  h("div",{style:{color:C.red,fontWeight:700,fontSize:16}},fmt(e.amount))
                )

              h("div",{style:{display:"flex",borderTop:`1px solid ${C.border}`}},
                e.notes&&h("button",{onClick:()=>toggleExp(e.id),style:{flex:1,background:"none",border:"none",color:C.muted,padding:"9px 14px",cursor:"pointer",fontSize:13,textAlign:"left"}},
                  expandedExp[e.id]?"▲ Ocultar nota":"▼ Ver nota"
                ),
                h("button",{onClick:()=>delRecord("expenses",e.id),style:{background:"none",border:"none",color:C.red+"99",padding:"9px 14px",cursor:"pointer",fontSize:13,marginLeft:"auto"}},"Eliminar")
              ),
              expandedExp[e.id]&&e.notes&&h("div",{style:{background:C.surface,padding:"10px 14px",fontSize:13,color:C.muted}},`📝 ${e.notes}`)
            ))
      ),

      // INCOME
      tab==="income"&&h("div",null,
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
          h("h2",{style:{fontFamily:"'Playfair Display',serif",fontSize:20}},"Mis Ingresos"),
          h("button",{onClick:()=>setModInc(true),style:{...btnP(me.color),width:"auto",padding:"10px 18px",fontSize:14}},"+ Agregar")
        ),
        myInc.length===0
          ?h(EmptyState,{icon:"💵",msg:"No hay ingresos este mes",action:"+ Agregar",onAction:()=>setModInc(true)})
          :h("div",null,
              myInc.map(i=>h("div",{key:i.id,style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",marginBottom:10}},
                h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"13px 14px"}},
                  h("div",{style:{flex:1}},
                    h("div",{style:{fontSize:15,fontWeight:600,marginBottom:3}},i.description),
                    h("div",{style:{fontSize:12,color:C.muted}},`${i.category} · ${i.type}`)
                  ),
                  h("div",{style:{color:C.green,fontWeight:700,fontSize:16}},fmt(i.amount))
                ),
                h("div",{style:{borderTop:`1px solid ${C.border}`}},
                  h("button",{onClick:()=>delRecord("incomes",i.id),style:{background:"none",border:"none",color:C.red+"99",padding:"9px 14px",cursor:"pointer",fontSize:13,width:"100%",textAlign:"right"}},"Eliminar")
                )
              )),
              h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14,display:"flex",justifyContent:"space-between"}},
                h("span",{style:{color:C.muted,fontWeight:700}},"TOTAL INGRESOS"),
                h("span",{style:{color:C.green,fontWeight:700,fontSize:18}},fmt(totalMyInc))
              )
            )
      ),

      // SAVINGS
      tab==="savings"&&h("div",null,
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
          h("h2",{style:{fontFamily:"'Playfair Display',serif",fontSize:20}},"Ahorros"),
          h("div",{style:{display:"flex",gap:8}},
            h("button",{onClick:()=>setModSavGoal(true),style:{...btnSec,width:"auto",padding:"10px 14px",fontSize:13}},"+ Meta"),
            h("button",{onClick:()=>setModSav(true),style:{...btnP(me.color),width:"auto",padding:"10px 18px",fontSize:14}},"+ Ahorro")
          )
        ),
        h("div",{style:{background:C.surface,borderRadius:10,padding:"10px 14px",fontSize:13,color:C.muted,marginBottom:16}},
          "💡 Registra ",h("b",{style:{color:C.text}},"tu propia aportación"),". En metas compartidas la app suma las de ambos."
        ),
        mSav.length===0
          ?h(EmptyState,{icon:"🏦",msg:"No hay ahorros este mes",action:"+ Agregar ahorro",onAction:()=>setModSav(true)})
          :state.savingsGoals.map(goal=>{
              const entries=mSav.filter(s=>s.goalId===goal.id);
              const total=entries.reduce((s,e)=>s+e.amount,0);
              if(entries.length===0)return null;
              return h("div",{key:goal.id,style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:10}},
                h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
                  h("div",null,
                    h("div",{style:{fontWeight:700,marginBottom:5}},goal.name),
                    h(Pill,{label:goal.owner,color:goal.owner==="Compartido"?C.purple:me.color})
                  ),
                  h("div",{style:{color:C.purple,fontWeight:700,fontSize:18}},fmt(total))
                ),
                entries.map(e=>h("div",{key:e.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:`1px solid ${C.border}`,fontSize:13}},
                  h("span",{style:{color:C.muted}},`${e.notes||"Aportación"} · ${USERS.find(u=>u.id===e.userId)?.name}`),
                  h("div",{style:{display:"flex",gap:10,alignItems:"center"}},
                    h("span",{style:{color:C.purple,fontWeight:600}},fmt(e.amount)),
                    h("button",{onClick:()=>delRecord("savings",e.id),style:{background:"none",border:"none",color:C.red+"99",cursor:"pointer",fontSize:12}},"✕")
                  )
                ))
              );
            })
      ),

      // BUDGET
      tab==="budget"&&h("div",null,
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
          h("h2",{style:{fontFamily:"'Playfair Display',serif",fontSize:20}},"Presupuesto"),
          h("div",{style:{display:"flex",gap:8}},
            h("button",{onClick:()=>setModCat(true),style:{...btnSec,width:"auto",padding:"10px 12px",fontSize:13}},"+ Cat."),
            h("button",{onClick:()=>setModBud(true),style:{...btnP(me.color),width:"auto",padding:"10px 18px",fontSize:14}},"Editar")
          )
        ),
        h(SectionTitle,null,"Gastos Fijos"),
        state.categories.filter(c=>c.type==="Gasto Fijo").map(cat=>h(BudgetRow,{key:cat.id,cat,scope:cat.owner==="Compartido"?"compartido":"individual",getSpent,getBudget,color:me.color,onDel:()=>delCategory(cat.id)})),
        h(SectionTitle,null,"Gastos Variables"),
        state.categories.filter(c=>c.type==="Gasto Variable").map(cat=>h(BudgetRow,{key:cat.id,cat,scope:cat.owner==="Compartido"?"compartido":"individual",getSpent,getBudget,color:me.color,onDel:()=>delCategory(cat.id)})),
        h(SectionTitle,null,"Metas de Ahorro"),
        state.savingsGoals.map(goal=>{
          const aportado=mSav.filter(s=>s.goalId===goal.id&&s.userId===loggedUser).reduce((s,e)=>s+e.amount,0);
          const budg=getBudget(goal.id,"individual");
          return h("div",{key:goal.id,style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px",marginBottom:8}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
              h("div",{style:{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}},
                h("span",{style:{fontSize:14,fontWeight:500}},goal.name),
                h(Pill,{label:goal.owner,color:goal.owner==="Compartido"?C.purple:me.color})
              ),
              h("div",{style:{fontSize:13}},
                h("span",{style:{color:C.purple}},fmt(aportado)),
                budg>0&&h("span",{style:{color:C.muted}},` / ${fmt(budg)}`)
              )
            ),
            h(MiniBar,{value:aportado,max:budg||aportado||1,color:C.purple})
          );
        })
      ),

      // SHARED
      tab==="shared"&&h("div",null,
        h("h2",{style:{fontFamily:"'Playfair Display',serif",fontSize:20,marginBottom:16}},"Vista Compartida"),
        h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:18,marginBottom:14}},
          h("div",{style:{fontWeight:700,fontSize:15,marginBottom:14}},"⚖️ Balance compartido"),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
            USERS.map(u=>{
              const paid=mExp.filter(e=>e.shared&&e.userId===u.id&&!settledIds.has(e.id)).reduce((s,e)=>s+e.amount,0);
              return h("div",{key:u.id,style:{background:C.surface,borderRadius:10,padding:13}},
                h("div",{style:{color:C.muted,fontSize:10,marginBottom:3}},`${u.name.toUpperCase()} PAGÓ`),
                h("div",{style:{color:u.color,fontSize:18,fontWeight:700}},fmt(paid))
              );
            })
          ),
          h("div",{style:{background:C.surface,borderRadius:10,padding:13,marginBottom:10}},
            Math.abs(iOwePartner)<0.01
              ?h("div",{style:{color:C.green,fontWeight:700}},"✅ Están equilibrados")
              :iOwePartner>0
                ?h("div",{style:{fontWeight:700,color:me.color}},`Debes ${fmt(iOwePartner)} a ${partner.name}`)
                :h("div",{style:{fontWeight:700,color:partner.color}},`${partner.name} te debe ${fmt(Math.abs(iOwePartner))}`)
          ),
          thirdPartyDue>0&&h("div",{style:{background:C.surface,borderRadius:10,padding:13,marginBottom:10}},
            h("div",{style:{color:C.muted,fontSize:10,marginBottom:3}},"OTRAS PERSONAS NOS DEBEN"),
            h("div",{style:{color:C.green,fontWeight:700}},fmt(thirdPartyDue))
          ),
          Math.abs(iOwePartner)>0.01&&h("button",{onClick:()=>setModSettle(true),style:{...btnP(C.green),fontSize:14}},"✅ Registrar pago de deuda")
        ),
        h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:18,marginBottom:14}},
          h("div",{style:{fontWeight:700,fontSize:15,marginBottom:12}},"🏦 Ahorros conjuntos"),
          state.savingsGoals.filter(g=>g.owner==="Compartido").map(goal=>{
            const entries=mSav.filter(s=>s.goalId===goal.id);
            const total=entries.reduce((s,e)=>s+e.amount,0);
            const pablo=entries.filter(e=>e.userId==="pablo").reduce((s,e)=>s+e.amount,0);
            const sofia=entries.filter(e=>e.userId==="sofia").reduce((s,e)=>s+e.amount,0);
            return h("div",{key:goal.id,style:{borderBottom:`1px solid ${C.border}`,paddingBottom:10,marginBottom:10}},
              h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
                h("span",{style:{fontWeight:600,fontSize:14}},goal.name),
                h("span",{style:{color:C.purple,fontWeight:700}},fmt(total))
              ),
              h("div",{style:{fontSize:12,color:C.muted,display:"flex",gap:14}},
                h("span",{style:{color:C.pablo}},`Pablo: ${fmt(pablo)}`),
                h("span",{style:{color:C.sofia}},`Sofía: ${fmt(sofia)}`)
              )
            );
          })
        ),
        h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:18}},
          h("div",{style:{fontWeight:700,fontSize:15,marginBottom:12}},"💳 Gastos compartidos del mes"),
          sharedExp.length===0
            ?h("div",{style:{color:C.muted,fontSize:13}},"No hay gastos compartidos este mes")
            :sharedExp.map(e=>{
                const settled=settledIds.has(e.id);
                return h("div",{key:e.id,style:{borderBottom:`1px solid ${C.border}`,paddingBottom:12,marginBottom:12,opacity:settled?.6:1}},
                  h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
                    h("div",{style:{flex:1,minWidth:0}},
                      h("div",{style:{fontSize:14,fontWeight:600,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}},
                        e.description,
                        settled&&h(Pill,{label:"Saldado",color:C.green})
                      ),
                      h("div",{style:{fontSize:12,color:C.muted,marginTop:3}},
                        `Pagó: ${USERS.find(u=>u.id===e.userId)?.name} · ${e.catName} · entre ${e.splitCount||2} personas`
                      )
                    ),
                    h("div",{style:{textAlign:"right",flexShrink:0,marginLeft:10}},
                      h("div",{style:{color:C.red,fontWeight:700}},fmt(e.amount)),
                      h("div",{style:{color:C.muted,fontSize:11}},`${fmt(e.amount/(e.splitCount||2))} c/u`)
                    )
                  ),
                  e.notes&&h("button",{onClick:()=>toggleExp(e.id),style:{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12,marginTop:4,padding:0}},
                    expandedExp[e.id]?"▲ Ocultar":"▼ Ver nota"
                  ),
                  expandedExp[e.id]&&e.notes&&h("div",{style:{fontSize:12,color:C.muted,marginTop:4}},`📝 ${e.notes}`)
                );
              })
        )
      )
    ),

    // BOTTOM NAV
    h("div",{style:{position:"fixed",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100}},
      TABS.map(t=>h("button",{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,background:"none",border:"none",padding:"10px 4px 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}},
        h("span",{style:{fontSize:20}},t.label),
        h("span",{style:{fontSize:9,fontWeight:700,color:tab===t.id?me.color:C.muted,letterSpacing:.5}},t.full.toUpperCase()),
        tab===t.id&&h("div",{style:{width:24,height:3,background:me.color,borderRadius:2}})
      ))
    ),

    // SYNC
    showSync&&h(SyncScreen,{state,setState,onClose:()=>setShowSync(false),me}),

    // MODALS
    modExp&&h(ExpenseModal,{state,me,MK,onAdd:addExpense,onClose:()=>setModExp(false)}),
    modInc&&h(IncomeModal,{state,onAdd:addIncome,onClose:()=>setModInc(false)}),
    modSav&&h(SavingModal,{state,onAdd:addSaving,onClose:()=>setModSav(false)}),
    modBud&&h(BudgetModal,{state,me,onAdd:addBudget,onClose:()=>setModBud(false)}),
    modCat&&h(CategoryModal,{onAdd:addCategory,onClose:()=>setModCat(false)}),
    modSavGoal&&h(SavGoalModal,{onAdd:addSavGoal,onClose:()=>setModSavGoal(false)}),
    modSettle&&h(SettleModal,{iOwePartner,partner,sharedExp,settledIds,onAdd:addSettlement,onClose:()=>setModSettle(false),me}),

    // TOAST
    toast&&h(Toast,{msg:toast,onDone:()=>setToast(null)})
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(h(App));
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js')
      .then(()=>console.log('SW ok'))
      .catch(e=>console.log('SW error',e));
  });
}
</script>
</body>
</html>
